<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom AI — 상세 처리 흐름 (부록)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  body{
    background:
      radial-gradient(100% 70% at 14% -10%, rgba(94,211,240,.08), transparent 55%),
      radial-gradient(80% 80% at 100% 110%, rgba(245,177,76,.05), transparent 50%),
      linear-gradient(rgba(94,211,240,.08) 1px,transparent 1px) 0 0/46px 46px,
      linear-gradient(90deg,rgba(94,211,240,.08) 1px,transparent 1px) 0 0/46px 46px,
      var(--ink);
  }
  .stage{position:fixed;inset:0;display:flex;flex-direction:column;
    gap:clamp(8px,1.2vw,14px);padding:clamp(12px,2vw,26px) clamp(28px,4vw,64px)}
  .head{max-width:1300px}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11.5px;letter-spacing:.32em;
    color:var(--cyan);text-transform:uppercase;margin-bottom:8px;
    display:flex;align-items:center;gap:12px;opacity:0;transform:translateX(-12px)}
  .eyebrow::before{content:"부록";color:var(--gold);font-weight:500;letter-spacing:.1em}
  body.in .eyebrow{animation:slin .6s ease forwards .1s}
  h2{font-family:"Space Grotesk",sans-serif;font-weight:600;
    font-size:clamp(20px,2.4vw,32px);letter-spacing:-.02em;line-height:1.08;
    opacity:0;transform:translateY(16px)}
  body.in h2{animation:rise .7s ease forwards .2s}
  h2 .em{color:var(--cyan)}
  .sub{margin-top:5px;color:var(--muted);font-size:clamp(11px,1.05vw,13px);line-height:1.5;
    opacity:0;transform:translateY(12px)}
  body.in .sub{animation:rise .7s ease forwards .32s}
  .sub b{color:var(--text)}

  .diagram{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;
    padding:clamp(6px,.8vw,12px);border-radius:14px;
    border:1px solid rgba(94,211,240,.18);background:rgba(8,14,26,.5);
    opacity:0;transform:translateY(20px)}
  body.in .diagram{animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards .46s}
  .diagram img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  @media (prefers-reduced-motion:reduce){*{opacity:1!important;transform:none!important}}
</style>
</head>
<body>
  <div class="stage">
    <header class="head">
      <div class="eyebrow">The Axiom · 상세 처리 흐름</div>
      <h2>전체 흐름 <span class="em">상세판</span> — 온·오프라인 분기와 안전장치 전부</h2>
      <p class="sub">
        앞의 요약본을 실제 구현 기준으로 펼친 도식입니다 — <b>헬스체크·중간 실패 폴백·게이트·프롬프트 다이어트</b>까지 포함.
        발표 중 세부 질문이 나올 때 참고용으로 사용합니다.
      </p>
    </header>

    <div class="diagram">
      <img src="axiom-실제흐름.svg" alt="Axiom AI 상세 처리 흐름 — 온·오프라인 분기, 질문/코드수정 갈래, 게이트 검증, 프롬프트 다이어트, 오프라인 폴백">
    </div>
  </div>

<script>
  function play(){document.body.classList.add('in');}
  function reset(){document.body.classList.remove('in');void document.body.offsetWidth;requestAnimationFrame(play);}
  if(document.readyState==='complete')requestAnimationFrame(play);
  else window.addEventListener('load',()=>requestAnimationFrame(play));
  window.addEventListener('message',e=>{if(e&&e.data&&e.data.type==='slide:enter')reset();});
  window.addEventListener('keydown',function(e){var k=e.key,nav=['ArrowRight','ArrowLeft','ArrowUp','ArrowDown','PageUp','PageDown',' ','Home','End','f','F'];if(nav.indexOf(k)>-1){e.preventDefault();if(parent!==window)parent.postMessage({type:'slide:key',key:k},'*');}});
</script>
</body>
</html>
