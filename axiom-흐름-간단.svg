<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 700" font-family="'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif">
  <defs>
    <marker id="am" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L11,4.5 L0,9 Z" fill="#7E8FB8"/>
    </marker>
    <marker id="ag" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L11,4.5 L0,9 Z" fill="#F5B14C"/>
    </marker>
    <style>
      .t{fill:#f2f5fc;font-weight:700;font-size:23px}
      .s{fill:#a8b7da;font-size:16.5px}
      .lane{fill:#dbe4fb;font-weight:700;font-size:23px;letter-spacing:1px}
      .box{stroke-width:2.6;rx:15}
      .neutral{fill:#0d1424;stroke:#3a496b}
      .cyan{fill:#0b1a24;stroke:#5ED3F0}
      .violet{fill:#160f26;stroke:#A78BFA}
      .gold{fill:#1d1608;stroke:#F5B14C}
      .decision{fill:#101a2c;stroke:#F5B14C}
      .flow{stroke:#8394ba;stroke-width:2.8;fill:none}
      .fb{stroke:#F5B14C;stroke-width:2.8;fill:none;stroke-dasharray:8 5}
    </style>
  </defs>

  <rect x="0" y="0" width="1900" height="700" fill="#070B16"/>

  <!-- Legend -->
  <rect x="40" y="26" width="330" height="72" rx="12" fill="#0b1120" stroke="#2a3550"/>
  <rect x="58" y="42" width="18" height="18" rx="4" class="cyan"/>
  <text x="86" y="57" class="s">프로그램이 규칙대로 (확실)</text>
  <rect x="58" y="68" width="18" height="18" rx="4" class="violet"/>
  <text x="86" y="83" class="s">AI 모델이 생성 (불확실)</text>

  <!-- entry column (center x=560) -->
  <rect x="450" y="34" width="220" height="62" class="box neutral"/>
  <text x="560" y="73" class="t" text-anchor="middle">프롬프트 입력</text>

  <line class="flow" x1="560" y1="96" x2="560" y2="112" marker-end="url(#am)"/>
  <rect x="408" y="115" width="304" height="78" class="box decision"/>
  <text x="560" y="150" class="t" text-anchor="middle">서버(사내 AI) 연결 확인</text>
  <text x="560" y="176" class="s" text-anchor="middle">온라인 ? / 오프라인 ?</text>

  <line class="flow" x1="560" y1="193" x2="560" y2="223" marker-end="url(#am)"/>
  <text x="584" y="214" fill="#5ED3F0" font-size="16.5" font-weight="700">온라인 ✓</text>
  <rect x="428" y="226" width="264" height="66" class="box violet"/>
  <text x="560" y="266" class="t" text-anchor="middle">무슨 요청인지 판단</text>

  <!-- branch to lanes -->
  <path class="flow" d="M480,292 C400,330 300,336 300,356" marker-end="url(#am)"/>
  <path class="flow" d="M640,292 C820,330 920,336 920,356" marker-end="url(#am)"/>

  <!-- Q&A lane (center x=300) -->
  <text x="300" y="340" class="lane" text-anchor="middle">질문 (Q&amp;A)</text>
  <rect x="150" y="358" width="300" height="74" class="box cyan"/>
  <text x="300" y="393" class="t" text-anchor="middle">관련 문서 찾기</text>
  <text x="300" y="417" class="s" text-anchor="middle">RAG · 유사도 검색</text>

  <line class="flow" x1="300" y1="432" x2="300" y2="452" marker-end="url(#am)"/>
  <rect x="150" y="455" width="300" height="74" class="box violet"/>
  <text x="300" y="490" class="t" text-anchor="middle">사내 AI 모델(sLLM)</text>
  <text x="300" y="514" class="s" text-anchor="middle">모델이 답변 생성</text>

  <line class="flow" x1="300" y1="529" x2="300" y2="549" marker-end="url(#am)"/>
  <rect x="150" y="552" width="300" height="62" class="box neutral"/>
  <text x="300" y="590" class="t" text-anchor="middle">답변 표시</text>

  <!-- code-edit lane (center x=920) -->
  <text x="920" y="340" class="lane" text-anchor="middle">코드 수정</text>
  <rect x="770" y="358" width="300" height="74" class="box cyan"/>
  <text x="920" y="391" class="t" text-anchor="middle">고칠 곳 지정</text>
  <text x="920" y="416" class="s" text-anchor="middle">+ ‘정답 규약’ 자동 첨부 (프로그램)</text>

  <line class="flow" x1="920" y1="432" x2="920" y2="452" marker-end="url(#am)"/>
  <rect x="770" y="455" width="300" height="74" class="box violet"/>
  <text x="920" y="488" class="t" text-anchor="middle">사내 AI 모델(sLLM)</text>
  <text x="920" y="513" class="s" text-anchor="middle">필요한 코드 ‘조각만’ 생성</text>

  <line class="flow" x1="920" y1="529" x2="920" y2="549" marker-end="url(#am)"/>
  <rect x="770" y="552" width="300" height="74" class="box gold"/>
  <text x="920" y="585" class="t" text-anchor="middle">적용 전 안전 검사</text>
  <text x="920" y="610" class="s" text-anchor="middle">게이트+타입 검사 → diff 제안</text>

  <!-- prompt diet one-liner (spans both lanes) -->
  <rect x="150" y="632" width="920" height="50" rx="13" fill="#0b1a24" stroke="#5ED3F0" stroke-opacity="0.5" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="610" y="663" text-anchor="middle" fill="#bfe9f7" font-size="17">AI에 보낼 땐 <tspan font-weight="700">작은 모델에 맞춰 프롬프트를 줄여 전송</tspan> (프롬프트 다이어트 · thinking off)</text>

  <!-- offline branch (right) -->
  <path class="fb" d="M712,150 C920,140 1080,140 1215,168" marker-end="url(#ag)"/>
  <text x="960" y="128" fill="#F5B14C" font-size="16.5" font-weight="700" text-anchor="middle">서버 없음 → 오프라인</text>

  <rect x="1220" y="150" width="640" height="252" class="box gold"/>
  <text x="1540" y="196" class="t" text-anchor="middle" fill="#f3c583" font-size="24">오프라인 — 모델 없이 로컬</text>
  <text x="1252" y="242" class="s" font-size="17">· 로컬 문서 검색 + 규칙 기반 응답</text>
  <text x="1252" y="278" class="s" font-size="17">· 규칙 기반 코드 이식 / 수동 안내</text>
  <text x="1252" y="314" class="s" font-size="17">· 데이터 외부 전송 0 — 폐쇄망 안전</text>
  <text x="1252" y="350" class="s" font-size="17">· 서버 복구되면 온라인 흐름 자동 사용</text>

  <!-- key message (bottom-right) -->
  <rect x="1220" y="428" width="640" height="204" rx="15" fill="#0d1424" stroke="#3a496b"/>
  <text x="1540" y="500" text-anchor="middle" font-size="22" font-weight="700" fill="#5ED3F0">핵심</text>
  <text x="1540" y="544" text-anchor="middle" font-size="19" fill="#f2f5fc">틀리면 안 되는 ‘결정·검증’은</text>
  <text x="1540" y="576" text-anchor="middle" font-size="19" fill="#f2f5fc"><tspan font-weight="700" fill="#5ED3F0">프로그램(파랑)</tspan>이,</text>
  <text x="1540" y="608" text-anchor="middle" font-size="19" fill="#f2f5fc">‘생성’만 <tspan font-weight="700" fill="#A78BFA">AI(보라)</tspan>가 맡습니다</text>
</svg>
