<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>react-app-scaffold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+KR:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/04-0-scaffold-intro.css">
</head>
<body>
  <span class="reg tl"></span><span class="reg tr"></span>
  <span class="reg bl"></span><span class="reg br"></span>
  <div class="stage">
    <div class="wrap">
      <div class="eyebrow">01 — 무엇을 만들었나</div>
      <h1>
        <span class="word w1">react-app-</span><span class="word w2">scaffold</span>
      </h1>
      <div class="accent"></div>
      <p class="sub">프로젝트 초기 세팅 없이, <b>바로 가져다 쓰는</b> React · TypeScript 스타터</p>
    </div>
  </div>

<script>
  function play(){document.body.classList.add('in');}
  function reset(){document.body.classList.remove('in');void document.body.offsetWidth;requestAnimationFrame(play);}
  if(document.readyState==='complete')requestAnimationFrame(play);
  else window.addEventListener('load',()=>requestAnimationFrame(play));
  window.addEventListener('message',e=>{if(e&&e.data&&e.data.type==='slide:enter')reset();});
  window.addEventListener('keydown',function(e){var k=e.key,nav=['ArrowRight','ArrowLeft','ArrowUp','ArrowDown','PageUp','PageDown',' ','Home','End','f','F'];if(nav.indexOf(k)>-1){e.preventDefault();if(parent!==window)parent.postMessage({type:'slide:key',key:k},'*');}});
</script>
</body>
</html>
