<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>왜 만들었나 — 개선 후 ①</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/03-why-situation.css">
</head>
<body class="after">
  <span class="reg tl"></span><span class="reg tr"></span>
  <span class="reg bl"></span><span class="reg br"></span>
  <div class="stage">
    <div class="wrap">
      <div class="head">
        <div class="eyebrow">
          <span class="tag">After · 개선 후</span>
          <span class="sep"></span>
          <span class="step"><b>01</b> / 02</span>
        </div>
        <h2>반복되던 <span class="em">이 모든 작업</span>이, 이미 완성된 채로 세팅되어 있습니다</h2>
        <!-- <p class="lead">UI/UX 디자인 시스템, 공통 함수·유틸, 상태관리 로직까지 — <b>처음부터 갖춰진 상태</b>에서 비즈니스 로직만 얹으면 됩니다.</p> -->
      </div>
      <figure class="shot shrink" data-ph="개선 후 ① · 완성된 세팅 — img/why-after-1.png">
        <img src="img/03_03.png" alt="UI/UX 디자인 시스템·공통 함수·유틸·상태관리 로직이 이미 완성 세팅된 모습"
             onload="this.closest('.shot').classList.add('has-img')"
             onerror="this.style.display='none'">
      </figure>
    </div>
  </div>

<script>
  function play(){document.body.classList.add('in');}
  function reset(){document.body.classList.remove('in');void document.body.offsetWidth;requestAnimationFrame(play);}
  if(document.readyState==='complete')requestAnimationFrame(play);
  else window.addEventListener('load',()=>requestAnimationFrame(play));
  window.addEventListener('message',e=>{if(e&&e.data&&e.data.type==='slide:enter')reset();});
</script>
</body>
</html>
